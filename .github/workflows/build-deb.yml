name: Build Debian package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  release:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: sudo apt-get install -y fakeroot

      - name: Build .deb
        run: bash build-deb.sh

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<="Version": ")[^"]+' metadata.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "deb=plasma-applet-net-quality_${VERSION}-1_all.deb" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Create release and attach .deb
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}
          files: ${{ steps.version.outputs.deb }}
