name: Build Debian package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: sudo apt-get install -y fakeroot

      - name: Build .deb
        run: bash build-deb.sh

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '(?<="Version": ")[^"]+' metadata.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "deb=plasma-applet-net-quality_${VERSION}-1_all.deb" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: plasma-applet-net-quality-deb
          path: ${{ steps.version.outputs.deb }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.version.outputs.deb }}
          generate_release_notes: true
